<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM example</title>
</head>
<body>
    <h1 id="name">Welcome to My Website</h1>
    <button onclick="changeText()">Click Here</button>
    <script>
        function changeText(){
            let element = document.getElementById("name")
            element.innerText = "Welcome to DOM Manipulation"
        }
    </script>
</body>
</html>
