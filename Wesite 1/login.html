<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body{
            font-family: Arial;
            margin: 0;
        }
        .header{
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        
        }
        .header:hover{
            background-color: aqua;
        }
        .nav{
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        .nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            padding: 8px 12px;
            text-align: center;
            
        }
        .nav a:hover{
            background-color: orange;
            color: black;
            border-radius: 5px;

        }
        .content{
            padding: 50px;
            margin: 20px auto;
            border: 2px solid rgb(0, 0, 0); 
            text-align: center;
            background-color: rgb(25, 83, 134);
        }
        .footer{
            background-color: lightgray;
            text-align: center;
            padding: 15px;
        }
        form{
            text-align: center;
            border-radius: 90%;
            margin: 20px;
            background-color: rgba(94, 143, 185, 0.596);
            padding: 20px;
            
        }
        .login-box{
            box-shadow: 4px 4px;
            border-radius: 90%;
            width: 500px;
            margin: 30px auto;
            padding: 20px;
            border: 2px solid gray;
            text-align: center;
            background-color: rgba(56, 112, 160, 0.603);
        }
        .login-box input{
            
            width: 70%;
            padding: 8px;
            margin: 8px 0;
        }
        .login-box button{
            padding: 8px 15px;
            background-color: lightblue;
            border: none;
            cursor: pointer;
            border-radius: 90%;
        }
        .login-box button:hover{
            background-color: orange;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Annamacharya University Admission</h1>
    </div>
    <div class="nav">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact us</a>
    </div>
    <div class="content">
        <h2>Welcome to My Website</h2>
        <p>This is a simple website Layout created using HTML and CSS</p>
    <h3>Student Login</h3>
    <div class="login-box">
        
        <form>
            <label>Registration Number</label><br>
            <input type="text" placeholder="Enter Registration Number"><br>
            <label>Password</label><br>
            <input type="password" placeholder="Enter Password"><br>
            <button type="submit">Login</button>
        </form>
    </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 My Website</p>
    </div>
</body>
</html>
